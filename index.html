<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Voice Conversion Demos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #f0f2f5; }
        .section-title {color: black; padding: 15px; margin-top: 40px; border-radius: 8px 8px 0 0; }
        
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 50px; background: white; border-radius: 0 0 8px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th, td { padding: 12px; border: 1px solid #e0e0e0; text-align: center; vertical-align: top; }
        th { background-color: #343a40; color: white; position: sticky; top: 0; z-index: 10; }

        /* Tối ưu Player */
        audio { width: 380px; height: 40px; display: block; margin: 5px auto; }
        
        .file-box { margin-bottom: 10px; padding: 8px; background: #f9f9f9; border-radius: 4px; border: 1px solid #eee; }
        .file-label { font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 3px; }
        .main-audio { border-left: 4px solid #28a745; }
        .other-audio { border-left: 4px solid #ffc107; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Voice Conversion Demos</h1>

    <div id="content">
        <!-- Phần 1: Prefix 0_ -->
        <h2 class="section-title">PHẦN 1: ĐỌC (READING)</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>File Gốc (GT)</th>
                        <th>Giọng Nữ (Female)</th>
                        <th>Giọng Nam (Male)</th>
                    </tr>
                </thead>
                <tbody id="table-prefix-0"></tbody>
            </table>
        </div>

        <!-- Phần 2: Còn lại -->
        <h2 class="section-title">PHẦN 2: HÁT (SINGING)</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>File Gốc (GT)</th>
                        <th>Giọng Nữ (Female)</th>
                        <th>Giọng Nam (Male)</th>
                    </tr>
                </thead>
                <tbody id="table-others"></tbody>
            </table>
        </div>
    </div>

    <script>
        function createAudioHTML(path, label, isMain) {
            if (!path) return '';
            const fileName = path.split('/').pop();
            return `
                <div class="file-box ${isMain ? 'main-audio' : 'other-audio'}">
                    <span class="file-label"> ${fileName}</span>
                    <audio controls preload="none" src="${path}"></audio>
                </div>`;
        }

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                const tbody0 = document.getElementById('table-prefix-0');
                const tbodyOthers = document.getElementById('table-others');

                data.forEach(item => {
                    // Gom nhóm Nữ
                    let femaleCol = createAudioHTML(item.female_main, 'Nữ Chính', true);
                    item.female_others.forEach(p => femaleCol += createAudioHTML(p, 'Nữ Var', false));

                    // Gom nhóm Nam
                    let maleCol = createAudioHTML(item.male_main, 'Nam Chính', true);
                    item.male_others.forEach(p => maleCol += createAudioHTML(p, 'Nam Var', false));

                    const rowHtml = `
                        <tr>
                            <td><strong>${item.id}</strong></td>
                            <td>${createAudioHTML(item.original, 'Original', true)}</td>
                            <td>${femaleCol || '-'}</td>
                            <td>${maleCol || '-'}</td>
                        </tr>
                    `;

                    if (item.is_prefix_0) {
                        tbody0.innerHTML += rowHtml;
                    } else {
                        tbodyOthers.innerHTML += rowHtml;
                    }
                });
            });
    </script>
</body>
</html>
