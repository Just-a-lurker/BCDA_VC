<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Voice Conversion Comparison</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #dee2e6; text-align: center; }
        th { background-color: #343a40; color: white; }
        /* Tối ưu kích thước audio để tiết kiệm diện tích */
        audio { width: 220px; height: 35px; display: block; margin: 5px auto; }
        .other-container { max-height: 150px; overflow-y: auto; }
        .file-name { font-size: 10px; color: #777; display: block; }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Bảng So Sánh Kết Quả Voice Conversion</h2>
<div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>File Gốc</th>
                    <th>Giọng Nữ</th>
                    <th>Giọng Nam</th>
                    <th>Other (Phiên bản khác)</th>
                </tr>
            </thead>
            <tbody id="audio-table-body"></tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('audio-table-body');
                data.forEach(item => {
                    // Xử lý logic cho cột Other
                    let othersHtml = '-';
                    if (item.others && item.others.length > 0) {
                        othersHtml = item.others.map(path => {
                            const fileName = path.split('/').pop();
                            return `
                                <div style="margin-bottom: 8px;">
                                    <audio controls preload="none" src="${path}"></audio>
                                </div>`;
                        }).join('');
                    }

                    const row = `
                        <tr>
                            <td><strong>${item.id}</strong></td>
                            <td>
                                <audio controls preload="none" src="${item.original}"></audio>
                            </td>
                            <td>
                                ${item.female ? `<audio controls preload="none" src="${item.female}"></audio>` : '-'}
                            </td>
                            <td>
                                ${item.male ? `<audio controls preload="none" src="${item.male}"></audio>` : '-'}
                            </td>
                            <td><div class="other-container">${othersHtml}</div></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            })
            .catch(err => console.error('Lỗi load dữ liệu:', err));
    </script>
</body>
</html>

<style>
    body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; }
    
    /* Cho phép bảng cuộn ngang nếu quá rộng */
    .table-container {
        width: 100%;
        overflow-x: auto;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        background: white; 
        min-width: 1200px; /* Đảm bảo bảng đủ rộng để không bóp nghẹt các cột */
    }

    th, td { padding: 15px; border: 1px solid #dee2e6; text-align: center; }
    th { background-color: #343a40; color: white; position: sticky; top: 0; }

    /* Quan trọng: Tăng chiều rộng Player */
    audio { 
        width: 400px; /* Tăng từ 220px lên 400px để thanh progress hiện rõ */
        height: 40px; 
        display: block; 
        margin: 8px auto; 
    }

    .other-container { 
        max-height: 300px; 
        overflow-y: auto; 
        padding: 5px;
    }

    .file-name { 
        font-size: 11px; 
        color: #555; 
        font-weight: bold;
        margin-bottom: 2px; 
        display: block; 
    }
</style>
